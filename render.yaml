services:
  - type: web
    name: express-entry-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: express-entry-db
          property: connectionString

  - type: web
    name: express-entry-frontend
    runtime: static site
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: express-entry-redis
    plan: free
    maxmemoryPolicy: noevict

databases:
  - name: express-entry-db
    plan: free
    databaseName: express_entry
    user: postgres
