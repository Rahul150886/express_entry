version: '3.9'

services:
  # ─── API ────────────────────────────────────
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/express_entry
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - express_entry_net

  # ─── Celery Worker ──────────────────────────
  celery-worker:
    build: .
    command: celery -A workers.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/express_entry
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - express_entry_net

  # ─── Celery Beat (Scheduler) ─────────────────
  celery-beat:
    build: .
    command: celery -A workers.tasks.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    networks:
      - express_entry_net

  # ─── Flower (Celery Monitor) ─────────────────
  flower:
    build: .
    command: celery -A workers.tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    networks:
      - express_entry_net

  # ─── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: express_entry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - express_entry_net

  # ─── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - express_entry_net

  # ─── ChromaDB (Vector Store) ─────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    networks:
      - express_entry_net

  # ─── Adminer (DB UI) ────────────────────────
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - express_entry_net

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  express_entry_net:
    driver: bridge
