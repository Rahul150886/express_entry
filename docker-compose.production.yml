version: '3.9'

services:

  # ─── React Frontend ──────────────────────────
  frontend:
    image: ${REGISTRY}/${PROJECT_PATH}/frontend:${IMAGE_TAG}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_URL=${API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── FastAPI Backend ─────────────────────────
  api:
    image: ${REGISTRY}/${PROJECT_PATH}/backend:${IMAGE_TAG}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - ENVIRONMENT=production
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net
    restart: unless-stopped

  # ─── Celery Worker ───────────────────────────
  celery_worker:
    image: ${REGISTRY}/${PROJECT_PATH}/backend:${IMAGE_TAG}
    command: celery -A workers.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    env_file: .env.production
    depends_on:
      - api
      - redis
    networks:
      - app_net
    restart: unless-stopped

  # ─── PostgreSQL Database ────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=express_entry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  # ─── Redis Cache ────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  # ─── ChromaDB Vector Store ──────────────────
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    environment:
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - chromadb_data:/chroma/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  app_net:
    driver: bridge
